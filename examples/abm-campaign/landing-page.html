<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Platform — Personalized for You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a2e; }
    .hero {
      text-align: center; padding: 6rem 2rem 5rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #fff;
    }
    .hero h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 1rem; max-width: 700px; margin-left: auto; margin-right: auto; }
    .hero p { font-size: 1.2rem; opacity: 0.85; max-width: 550px; margin: 0 auto 2rem; }
    .hero .cta { display: inline-block; padding: 1rem 2.5rem; background: #3b82f6; color: #fff; font-weight: 700; font-size: 1.05rem; border-radius: 8px; text-decoration: none; }
    .proof-section { text-align: center; padding: 3rem 2rem; background: #f8fafc; }
    .proof-section p { font-size: 1.1rem; color: #475569; max-width: 600px; margin: 0 auto; }
    footer { text-align: center; padding: 2rem; color: #94a3b8; font-size: 0.85rem; }
    [data-gs-zone] { transition: opacity 0.2s ease; }
  </style>
</head>
<body>

  <!--
    ABM LANDING PAGE
    This page is served at /for/sarah-chen-acme (unique URL per contact).
    The design is identical for every contact. Only the zone TEXT changes.

    Zone types used:
      1. Property zones   — data-gs-zone="website_zones:hero_headline"
         Reads the pre-stored "hero_headline" property from the contact's
         "website_zones" collection in Personize. Instant, no LLM at serve time.

      2. Generative zones — data-gs-zone="proof"
         AI-generated at bake time using contact memory + brand guidelines.

    Setup:
      1. In Personize, create a collection "website_zones" with properties:
           - hero_headline  (Text) — e.g. "How Acme scaled API ops by 3x"
           - sub_headline   (Text) — e.g. "The platform built for API-first teams"
      2. Run your CRM sync pipeline to populate these for each contact.
      3. Run bake-and-run.ts to bake + generate all zones.
      4. Send unique URLs to prospects.
  -->

  <section class="hero">
    <!--
      Property zone: reads "hero_headline" from the "website_zones" collection.
      Populated by your CRM sync or enrichment pipeline — not generated by AI at serve time.
    -->
    <h1 data-gs-zone="website_zones:hero_headline">See how we can help your team</h1>

    <!--
      Property zone: reads "sub_headline" from the "website_zones" collection.
    -->
    <p data-gs-zone="website_zones:sub_headline">The modern platform that scales with your business. Built for teams who ship fast.</p>

    <a href="/demo" class="cta">
      <!--
        Generative zone: AI-written CTA text, personalized with the contact's first name.
      -->
      <span data-gs-zone="cta-text">Book a Demo</span>
    </a>
  </section>

  <section class="proof-section">
    <!--
      Generative zone: AI-written social proof relevant to the contact's industry.
    -->
    <p data-gs-zone="proof">Trusted by 500+ companies worldwide to power their critical infrastructure.</p>
  </section>

  <footer>
    <p>Acme Platform &mdash; Generative Sites ABM demo</p>
  </footer>

  <!-- gs.js — update data-endpoint to your server URL -->
  <script
    src="http://localhost:3400/gs.js"
    data-key="pk_test_demo"
    data-endpoint="http://localhost:3400"
    async
  ></script>

</body>
</html>
